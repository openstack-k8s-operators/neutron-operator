{{ range $endpt, $vhost := .VHosts }}
# {{ $endpt }} vhost {{ $vhost.ServerName }} configuration
<VirtualHost *:9696>
  ServerName {{ $vhost.ServerName }}

  TimeOut {{ $.TimeOut }}

  ## Logging
  ErrorLog /dev/stdout
  ServerSignature Off
  CustomLog /dev/stdout combined

  ## Request header rules
  ## as per http://httpd.apache.org/docs/2.2/mod/mod_headers.html#requestheader
{{- if $vhost.TLS }}
  RequestHeader setIfEmpty X-Forwarded-Proto "https"
{{- else }}
  RequestHeader setIfEmpty X-Forwarded-Proto "http"
{{- end }}

{{- if $vhost.TLS }}
  SetEnvIf X-Forwarded-Proto https HTTPS=1
  SetEnv REQUESTS_CA_BUNDLE /etc/pki/tls/certs/ca-bundle.crt
  SetEnv SSL_CERT_FILE /etc/pki/tls/certs/ca-bundle.crt

  ## SSL directives
  SSLEngine on
  SSLCertificateFile      "{{ $vhost.SSLCertificateFile }}"
  SSLCertificateKeyFile   "{{ $vhost.SSLCertificateKeyFile }}"
{{- if eq $.DeploymentType "httpd" }}
  ## WSGI configuration for httpd strategy (TLS only)
  WSGIProcessGroup {{ $endpt }}
  WSGIApplicationGroup %{GLOBAL}
  WSGIPassAuthorization On
  WSGIDaemonProcess {{ $endpt }} processes=2 threads=1 user=neutron group=neutron display-name={{ $endpt }}
  WSGIScriptAlias / /usr/bin/neutron-wsgi
{{- else if eq $.DeploymentType "eventlet" }}
  ## Proxy rules for eventlet strategy (TLS)
  ProxyRequests Off
  ProxyPreserveHost On
  ProxyPass / http://localhost:9697/ retry=10
  ProxyPassReverse / http://localhost:9697/
{{- end }}
{{- else }}
{{- if eq $.DeploymentType "eventlet" }}
  ## Proxy rules for eventlet strategy (non-TLS)
  ProxyRequests Off
  ProxyPreserveHost On
  ProxyPass / http://localhost:9697/ retry=10
  ProxyPassReverse / http://localhost:9697/
{{- end }}
{{- end }}
</VirtualHost>
{{ end }}

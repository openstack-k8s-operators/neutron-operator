[uwsgi]
# WSGI module for Neutron API
plugin = python3
module = neutron.wsgi.api:application

# Process configuration
master = true
processes = 2
threads = 1
enable-threads = true
start-time = %t
add-header = Connection: close
buffer-size = 65535
hook-master-start = unix_signal:15 gracefully_kill_them_all
thunder-lock = true
worker-reload-mercy = 80

# Network configuration
# Shared socket for both HTTP and HTTPS
shared-socket = 0.0.0.0:9696

# HTTP interface on the shared socket
http-socket = 0.0.0.0:9697

# Optional: HTTPS on the same socket when TLS certificates are available
https-socket = =0,/etc/pki/tls/certs/internal.crt,/etc/pki/tls/private/internal.key,HIGH

# Application configuration
lazy-apps = true
single-interpreter = true

# Process management
max-requests = 5000
max-requests-delta = 50
harakiri = 60
harakiri-verbose = true

# Logging
log-master = true
log-date = true

# Graceful shutdown
exit-on-reload = false
die-on-term = true
# Memory optimization
vacuum = true
memory-report = true

# Security
chmod-socket = 666
chdir = /var/lib/neutron

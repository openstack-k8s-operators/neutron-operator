---
- project:
    name: openstack-k8s-operators/neutron-operator
    github-check:
      jobs:
        - openstack-k8s-operators-content-provider:
            vars:
              cifmw_install_yamls_sdk_version: v1.41.1
        - neutron-operator-tempest-multinode-eventlet: &vars
            vars:
              cifmw_edpm_prepare_kustomizations:
                - apiVersion: kustomize.config.k8s.io/v1beta1
                  kind: Kustomization
                  namespace: openstack
                  patches:
                  - patch: |-
                      apiVersion: core.openstack.org/v1beta1
                      kind: OpenStackControlPlane
                      metadata:
                        name: unused
                      spec:
                        neutron:
                          template:
                            replicas: 3
                            customServiceConfig: |
                              [DEFAULT]
                              debug=true
                    target:
                      kind: OpenStackControlPlane
        # have issues
        #- neutron-operator-tempest-multinode-gunicorn
        - neutron-operator-tempest-multinode-uwsgi: *vars
        - neutron-operator-tempest-multinode-httpd: *vars

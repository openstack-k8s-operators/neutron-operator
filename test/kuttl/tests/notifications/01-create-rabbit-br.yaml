# Create rabbitmq-broadcaster for notifications and enable notifications
apiVersion: rabbitmq.openstack.org/v1beta1
kind: RabbitMq
metadata:
  name: rabbitmq-br
spec:
  replicas: 1
  storageClass: local-storage
  resources:
    limits:
      cpu: "0.5"
      memory: 500Mi
    requests:
      cpu: "0.5"
      memory: 500Mi
